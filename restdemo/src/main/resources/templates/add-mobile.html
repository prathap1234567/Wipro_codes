<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Store</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#141e30,#243b55);
        }

        .container{
            width:380px;
            padding:30px;
            border-radius:20px;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(10px);
            box-shadow:0 8px 32px rgba(0,0,0,0.3);
            color:white;
        }

        .container h2{
            text-align:center;
            margin-bottom:25px;
            font-size:30px;
            letter-spacing:1px;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box label{
            display:block;
            margin-bottom:8px;
            font-size:15px;
        }

        .input-box input{
            width:100%;
            padding:12px;
            border:none;
            outline:none;
            border-radius:10px;
            background:rgba(255,255,255,0.2);
            color:white;
            font-size:15px;
        }

        .input-box input::placeholder{
            color:#ddd;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#00c6ff;
            background:linear-gradient(to right,#0072ff,#00c6ff);
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
            font-weight:bold;
        }

        button:hover{
            transform:scale(1.03);
            box-shadow:0 5px 15px rgba(0,198,255,0.5);
        }

    </style>
</head>
<body>

    <div class="container">

        <h2>Add Mobile</h2>

       <form th:action="mobile-form" method="post" action="mobile" th:object="${mobile}">

    <div class="input-box">
        <label>Make</label>
        <input type="text" th:field="*{make}" placeholder="Enter Mobile Make">
    </div>

    <div class="input-box">
        <label>Model</label>
        <input type="text" th:field="*{model}" placeholder="Enter Mobile Model">
    </div>

    <div class="input-box">
        <label>Price</label>
        <input type="number" th:field="*{price}" placeholder="Enter Mobile Price">
    </div>

    <button type="submit">Submit</button>

</form>

    </div>

</body>
</html>
