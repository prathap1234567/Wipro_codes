<!-- add-employee.html -->

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Add Employee</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1d2671,#c33764);
}

.container{
    width:420px;
    padding:35px;
    border-radius:25px;
    background:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.container h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
    font-size:32px;
}

.input-box{
    margin-bottom:22px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    color:#444;
    font-weight:bold;
}

.input-box input{
    width:100%;
    padding:14px;
    border:2px solid #ddd;
    border-radius:12px;
    outline:none;
    font-size:15px;
}

.input-box input:focus{
    border-color:#6a11cb;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(to right,#6a11cb,#2575fc);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<h2>

Add Employee

</h2>

<form th:action="@{/employees}"
      th:object="${employee}"
      method="post">

<div class="input-box">

<label>Employee Name</label>

<input type="text"
       th:field="*{name}"
       placeholder="Enter Employee Name">

</div>

<div class="input-box">

<label>Department</label>

<input type="text"
       th:field="*{department}"
       placeholder="Enter Department">

</div>

<div class="input-box">

<label>Salary</label>

<input type="number"
       th:field="*{salary}"
       placeholder="Enter Salary">

</div>

<button type="submit">

Save Employee

</button>

</form>

</div>

</body>

</html>
