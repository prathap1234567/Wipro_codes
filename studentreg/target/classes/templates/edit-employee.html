<!-- edit-employee.html -->

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Edit Employee</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Calibri,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#232526,#414345);
}

.container{
    width:430px;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.container h2{
    text-align:center;
    margin-bottom:25px;
    font-size:32px;
    color:#333;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:18px;
    border:2px solid #ddd;
    border-radius:12px;
    outline:none;
    font-size:15px;
}

input:focus{
    border-color:#009688;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(to right,#11998e,#38ef7d);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<h2>

Edit Employee

</h2>

<form th:action="@{/employees/update}"
      th:object="${employee}"
      method="post">

<input type="hidden"
       th:field="*{id}">

<input type="text"
       th:field="*{name}"
       placeholder="Enter Employee Name">

<input type="text"
       th:field="*{department}"
       placeholder="Enter Department">

<input type="number"
       th:field="*{salary}"
       placeholder="Enter Salary">

<button type="submit">

Update Employee

</button>

</form>

</div>

</body>

</html>
