<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile List</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#141e30,#243b55);
    min-height:100vh;
    padding:40px;
}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    color:white;
}

h2{
    text-align:center;
    margin-bottom:30px;
    font-size:35px;
}

table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:10px;
}

th{
    background:#00c6ff;
    color:white;
    padding:15px;
    font-size:18px;
}

td{
    padding:15px;
    text-align:center;
    background:rgba(255,255,255,0.1);
    border-bottom:1px solid rgba(255,255,255,0.2);
}

tr:hover td{
    background:rgba(255,255,255,0.2);
}

.btn{
    padding:8px 15px;
    border-radius:8px;
    text-decoration:none;
    color:white;
    font-weight:bold;
}

.edit-btn{
    background:orange;
}

.delete-btn{
    background:red;
}

.add-btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 20px;
    background:linear-gradient(to right,#0072ff,#00c6ff);
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

    <h2>Mobile List</h2>

    <table>

        <tr>

            <th>ID</th>
            <th>Make</th>
            <th>Model</th>
            <th>Price</th>
            <th>Edit</th>
            <th>Delete</th>

        </tr>

        <tr th:each="m : ${mobileList}">

            <td th:text="${m.id}"></td>

            <td th:text="${m.make}"></td>

            <td th:text="${m.model}"></td>

            <td th:text="${m.price}"></td>

            <td>
                <a class="btn edit-btn"
                   th:href="@{/mobiles/edit/{id}(id=${m.id})}">
                   Edit
                </a>
            </td>

            <td>
                <a class="btn delete-btn"
                   th:href="@{/mobiles/delete/{id}(id=${m.id})}">
                   Delete
                </a>
            </td>

        </tr>

    </table>

    <a th:href="@{/mobiles}" class="add-btn">
        Add Mobile
    </a>

</div>

</body>
</html>
