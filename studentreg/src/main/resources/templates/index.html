<!-- index.html -->

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Management</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Verdana,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    padding:40px;
}

.container{
    width:95%;
    max-width:1100px;
    margin:auto;
    background:rgba(255,255,255,0.08);
    border-radius:25px;
    padding:35px;
    backdrop-filter:blur(12px);
    box-shadow:0 10px 35px rgba(0,0,0,0.4);
}

.heading{
    text-align:center;
    color:white;
    margin-bottom:30px;
    font-size:38px;
    letter-spacing:1px;
}

.search-box{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:25px;
}

.search-box input{
    width:320px;
    padding:14px;
    border:none;
    border-radius:12px;
    outline:none;
    font-size:15px;
}

.search-box button{
    padding:14px 22px;
    border:none;
    border-radius:12px;
    background:#00b4db;
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:15px;
}

th{
    background:#00b4db;
    color:white;
    padding:18px;
    font-size:18px;
}

td{
    padding:18px;
    text-align:center;
    color:white;
    background:rgba(255,255,255,0.08);
    border-bottom:1px solid rgba(255,255,255,0.15);
}

tr:hover td{
    background:rgba(255,255,255,0.15);
}

.btn{
    padding:9px 18px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    font-weight:bold;
}

.edit-btn{
    background:#ff9800;
}

.delete-btn{
    background:#f44336;
}

.add-btn{
    display:inline-block;
    margin-top:30px;
    padding:14px 24px;
    background:linear-gradient(to right,#11998e,#38ef7d);
    color:white;
    text-decoration:none;
    border-radius:12px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2 class="heading">

Employee Management System

</h2>

<form th:action="@{/employees/search}"
      method="get"
      class="search-box">

<input type="text"
       name="name"
       placeholder="Search Employee By Name">

<button type="submit">

Search

</button>

</form>

<table>

<tr>

<th>ID</th>
<th>Name</th>
<th>Department</th>
<th>Salary</th>
<th>Edit</th>
<th>Delete</th>

</tr>

<tr th:each="e : ${employeeList}">

<td th:text="${e.id}"></td>

<td th:text="${e.name}"></td>

<td th:text="${e.department}"></td>

<td th:text="${e.salary}"></td>

<td>

<a class="btn edit-btn"
   th:href="@{/employees/edit/{id}(id=${e.id})}">

Edit

</a>

</td>

<td>

<a class="btn delete-btn"
   th:href="@{/employees/delete/{id}(id=${e.id})}">

Delete

</a>

</td>

</tr>

</table>

<a th:href="@{/employees}"
   class="add-btn">

Add Employee

</a>

</div>

</body>

</html>
