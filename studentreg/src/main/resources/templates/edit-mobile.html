<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Edit Mobile</title>

<style>

body{
    font-family:Arial;
    background:linear-gradient(135deg,#141e30,#243b55);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:400px;
    background:white;
    padding:30px;
    border-radius:15px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    background:blue;
    color:white;
    border:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Edit Mobile</h2>

<form th:action="@{/mobiles/update}"
      th:object="${mobile}"
      method="post">

    <input type="hidden" th:field="*{id}">

    <input type="text" th:field="*{make}">

    <input type="text" th:field="*{model}">

    <input type="number" th:field="*{price}">

    <button type="submit">Update</button>

</form>

</div>

</body>
</html>
